version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_app
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - symfony

  nginx:
    image: nginx:stable-alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - symfony

  db:
    image: postgres:15-alpine
    container_name: symfony_postgres
    environment:
      POSTGRES_DB: symfony
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - symfony

  db_test:
      image: postgres:15-alpine
      container_name: symfony_postgres_test
      environment:
          POSTGRES_USER: symfony
          POSTGRES_PASSWORD: symfony
          POSTGRES_DB: test_db
      ports:
          - "5433:5432"
      volumes:
          - db_test_data:/var/lib/postgresql/data
          - ./docker/db/init_test:/docker-entrypoint-initdb.d
      networks:
          - symfony

volumes:
  db_data:

networks:
  symfony:
