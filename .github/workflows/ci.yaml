name: CI

on:
    push:
    pull_request:

jobs:

    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Prepare .env
              run: cp .env.example .env

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      vendor
                      ~/.composer/cache
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-
            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist

    phpstan:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - uses: actions/checkout@v4

            - name: Prepare .env
              run: cp .env.example .env

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      vendor
                      ~/.composer/cache
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - run: composer install --no-interaction --prefer-dist

            - run: vendor/bin/phpstan analyse

    migrations:
        runs-on: ubuntu-latest
        needs: build

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: symfony
                    POSTGRES_PASSWORD: symfony
                    POSTGRES_DB: test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U symfony"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - uses: actions/checkout@v4

            - name: Prepare .env
              run: cp .env.example .env

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  extensions: pdo_pgsql

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      vendor
                      ~/.composer/cache
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - run: composer install --no-interaction --prefer-dist

            - name: Run migrations
              env:
                  DATABASE_URL: "pgsql://symfony:symfony@localhost:5432/test_db"
                  APP_ENV: test
              run: php bin/console doctrine:migrations:migrate --no-interaction

    behat:
        runs-on: ubuntu-latest
        needs: migrations

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: symfony
                    POSTGRES_PASSWORD: symfony
                    POSTGRES_DB: test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U symfony"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - uses: actions/checkout@v4

            - name: Prepare .env
              run: cp .env.example .env

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  extensions: pdo_pgsql

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      vendor
                      ~/.composer/cache
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - run: composer install --no-interaction --prefer-dist

            - name: Run migrations before tests
              env:
                  DATABASE_URL: "pgsql://symfony:symfony@localhost:5432/test_db"
                  APP_ENV: test
              run: php bin/console doctrine:migrations:migrate --no-interaction

            - name: Run Behat
              env:
                  DATABASE_URL: "pgsql://symfony:symfony@localhost:5432/test_db"
                  APP_ENV: test
              run: vendor/bin/behat
